---
name: Pull Request Tests

on:
  pull_request:
    branches: ["*"]

jobs:
  test:
    runs-on: ubuntu-latest
    name: Test & Lint (Python ${{ matrix.python-version }})
    strategy:
      fail-fast: false
      matrix:
        # 3.11: floor / Raspberry Pi OS "bookworm" (real deployment target)
        # 3.12: common desktop/CI baseline (broad contributor-environment coverage)
        # 3.13: Raspberry Pi OS "trixie" (real deployment target)
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      # -----------------------------------------------------------------------
      # Checkout and setup
      # -----------------------------------------------------------------------
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      # -----------------------------------------------------------------------
      # Cache pip dependencies
      # -----------------------------------------------------------------------
      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-py${{ matrix.python-version }}-pip-${{ hashFiles('**/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-py${{ matrix.python-version }}-pip-

      # -----------------------------------------------------------------------
      # Install dependencies
      # -----------------------------------------------------------------------
      - name: Install project with dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      # -----------------------------------------------------------------------
      # Pre-commit hooks (file hygiene, yamllint, clockish-validate)
      # -----------------------------------------------------------------------
      - name: Run pre-commit hooks
        run: pre-commit run --all-files

      # -----------------------------------------------------------------------
      # Pytest with coverage report
      # -----------------------------------------------------------------------
      - name: Run pytest with coverage
        run: |
          pytest \
            --cov=src/clockish \
            --cov-report=html:htmlcov \
            --cov-report=term-missing

      # -----------------------------------------------------------------------
      # Upload coverage report as artifact
      # -----------------------------------------------------------------------
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-html-py${{ matrix.python-version }}
          path: htmlcov/
          retention-days: 30

      # -----------------------------------------------------------------------
      # Ruff lint check with GitHub annotations (warnings, not blocking)
      # -----------------------------------------------------------------------
      - name: Run ruff check (with PR annotations)
        if: always()
        run: |
          ruff check . --output-format=github || true

      # -----------------------------------------------------------------------
      # MyPy type checking  --  target version is pinned in pyproject.toml
      # ([tool.mypy] python_version = "3.11", matching the floor/bookworm)
      # regardless of which interpreter in the matrix actually runs mypy.
      # -----------------------------------------------------------------------
      - name: Run mypy type checker
        if: always()
        run: mypy src/clockish
