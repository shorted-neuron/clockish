---
# clockish.yaml - config
# ---------------------------------------------------------------------------
# System information display: local time + all available fact sources.
# Display settings are in display.yaml  --  see configs/display/ for profiles.
#
# Row heights are percentages of the target 320x480 portrait canvas; panel
# widths are percentages of the target 320 width. font_size: auto sizes each
# panel to 75% of its OWN row height, so named-scale mismatches (a named font
# is a fixed % of the *display* height, not the row) can't happen here.
# Dividers and blank rows keep pixel heights  --  they're spacers, not
# content, so there's no font to size against.
# ---------------------------------------------------------------------------

orientation: portrait

rows:
  - name: app-header
    height: 8.33%
    background: navy
    panels:
      - type: text
        # justify: center
        label: "clockish.py"
        color: silver
        font_size: auto

  - name: app-version
    height: 6.25%
    background: navy
    panels:
      - type: fact
        # justify: center
        source: version
        label: "default"
        color: grey
        font_size: auto

  - name: divider-1
    height: 5px
    background: black
    panels:
      - type: divider
        height: 1px
        color: darkgrey

  - name: local-clock
    height: 11.67%
    panels:
      - type: clock
        # justify: center
        timezone: local
        time_format: 24hs
        color: white
        font_size: auto

  - name: local-date
    height: 7.50%
    panels:
      - type: date
        # justify: center
        timezone: local
        date_format: "%a, %B %-d %Y"
        color: pink
        font_size: auto

  - name: blank-1
    height: 6px
    background: black
    panels:
      - type: blank

  - name: help1
    height: 8.33%
    background: orange
    panels:
      - type: text
        # justify: center
        label: "check the docs"
        color: black
        font_size: auto

  - name: help2
    height: 8.33%
    background: orange
    panels:
      - type: text
        # justify: center
        label: "to configure!"
        color: black
        font_size: auto

  - name: blank-2
    height: 6px
    background: black
    panels:
      - type: blank

  - name: network
    height: 5.83%
    background: darkgrey
    panels:
      - type: fact
        # justify: center
        source: hostname
        label: "default"
        color: yellow
        font_size: auto
      - type: fact
        # justify: center
        source: ip
        # label: "default"
        color: cyan
        font_size: auto

  - name: blank-3
    height: 6px
    background: black
    panels:
      - type: blank

  - name: wifi-status
    height: 9.17%
    background: darkred
    panels:
      - type: wifi_graphic
        width: 13.75%
        # justify: center
        color: lime
        background: black
      - type: fact
        # justify: center
        source: wifi_status
        color: lime
        font_size: auto
      - type: fact
        # justify: center
        source: wifi_ssid
        label: "default"
        color: darklime
        font_size: auto

