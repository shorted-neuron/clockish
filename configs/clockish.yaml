# clockish.yaml - config
# ---------------------------------------------------------------------------
# System information display: local time + all available fact sources.
# See clockish.yaml for full documentation.
# ---------------------------------------------------------------------------

display:
  # driver selects the hardware backend (default: ili9486).
  # Other choices will be added here as new drivers are implemented.
  driver:   ili9486

  width:    320
  height:   480
  rotation: 90      # 0 / 90 / 180 / 270 degrees

  # --- ILI9486 driver settings (all optional, values below are defaults) ---
  # sku:          MPI3501   # MPI3501 (RGB666) | MHS3528 (RGB565)
  # spi_bus:      0
  # spi_device:   0
  # spi_speed_hz: 64000000
  # dc_pin:       24        # BCM GPIO number for Data/Command
  # rst_pin:      25        # BCM GPIO number for Reset

rows:
  - name: app-header
    height: 40
    background: navy
    panels:
      - type: text
        # justify: center
        label: "clockish.py"
        color: silver
        font: normal

  - name: app-version
    height: 30
    background: navy
    panels:
      - type: fact
        # justify: center
        source: version
        label: "default"
        color: grey
        font: small

  - name: divider-1
    height: 5
    background: black
    panels:
      - type: divider
        height: 1
        color: darkgrey

  - name: local-clock
    height: 56
    panels:
      - type: clock
        # justify: center
        timezone: local
        time_format: 24hs
        colors:
          time:   white
          label:  grey
        time_font: big

  - name: local-date
    height: 36
    panels:
      - type: date
        # justify: center
        timezone: local
        date_format: "%a, %B %-d %Y"
        colors:
          date: pink
        date_font: normal

  - name: blank-1
    height: 6
    background: black

  - name: help1
    height: 40
    background: orange
    panels:
      - type: text
        # justify: center
        label: "check the docs"
        color: black
        font: normal

  - name: help2
    height: 40
    background: orange
    panels:
      - type: text
        # justify: center
        label: "to configure!"
        color: black
        font: normal

  - name: blank-2
    height: 6
    background: black

  - name: network
    height: 28
    background: darkgrey
    panels:
      - type: fact
        # justify: center
        source: hostname
        label: "default"
        color: yellow
        font: small
      - type: fact
        # justify: center
        source: ip
        # label: "default"
        color: cyan
        font: small

  - name: blank-3
    height: 6
    background: black

  - name: wifi-status
    height: 44
    background: darkred
    panels:
      - type: wifi_graphic
        width: 44
        # justify: center
        color: lime
        background: black
      - type: fact
        # justify: center
        source: wifi_status
        color: lime
        font: normal
      - type: fact
        # justify: center
        source: wifi_ssid
        label: "default"
        color: darklime
        font: normal

