---
# vert-clocks.yaml
# ---------------------------------------------------------------------------
# Display layout configuration for clockish
#
# display:
#   width, height - physical pixel dimensions of the display
#   rotation      - 0, 90, 180, or 270 degrees.  Controls which corner of the
#                   panel is the origin (UPPER_LEFT / UPPER_RIGHT / LOWER_RIGHT /
#                   LOWER_LEFT).  Use 90 for the typical landscape ILI9486 wiring.
#
# Each row has a mandatory 'height' (pixels) and an optional 'name' (shown in
# --debug-layout output).  The program warns on stderr if the total exceeds the
# display height; content that overflows is simply clipped.
#
# Rows contain one or more panels laid out left-to-right.  A row with a single
# panel fills the full width automatically.
#
# Panel types:
#   clock   - shows current time for a timezone, with optional label
#             label is placed to the right of the time if it fits, else below
#   date    - shows a formatted date line for a timezone
#   fact    - shows system facts:
#               ip, hostname, uptime, cpu, cpu_load, mem, disk, temp
#               ntp_status, ntp_upstream, ntp_all (status + upstream count)
#               wireguard  (output of /usr/local/bin/wgstatus.sh, cached 30s)
#               wifi_status, wifi_ssid, wifi_signal, wifi_quality
#               wifi_all  (all four wifi fields joined on one line)
#   text    - static label string
#   wifi_graphic - wifi signal strength graphic (arcs + dot).
#               color sets arc/dot colour; background sets bg.
#               Uses wifi_info internally (no 'source' key needed).
#               When disconnected: grey symbol with red X.
#   divider - a thin colored horizontal rule
#   blank   - empty space
#   debug   - timing/performance overlay; shows prep/display ms.
#             Remove or comment out to disable.
#
# Timezones: any IANA name e.g. "UTC", "America/Denver", "America/New_York",
#            "Europe/London", "Asia/Tokyo"   --  or "local" for system local time.
#
# Colors: any name from pyili9486.colors  (case-insensitive)
#
# fact panel label behaviour:
#   no label key   -> bare value, no prefix
#   label: default -> built-in default label for that source (e.g. "ip ", "signal ")
#   label: "foo "  -> custom prefix string
#
# justify: center (default), left, or right   --  horizontal alignment within panel cell
#
# time_format:
#   12h  ->  "1:23 PM"      (%-I:%M %p  on Linux)
#   24h  ->  "13:23"        (%H:%M)
#   24hs ->  "13:23:45"     (%H:%M:%S)
# ---------------------------------------------------------------------------
#
# Font package suggestions:
#  apt install fonts-ubuntu fonts-liberation fonts-noto-core fonts-croscore fonts-freefont-ttf

# Display settings are in display.yaml  --  use configs/display/ili9486-portrait.yaml.

orientation: portrait

rows:
  - name: utc-clock
    height: 15.00%
    # background: black  # black is default
    panels:
      - type: clock
        # justify: center
        timezone: UTC
        # label: "UTC"
        time_format: 24hs       # HH:MM:SS
        color: lime
        font_size: auto
        font_behavior: scale_numeric

  - name: utc-date
    height: 6.25%
    panels:
      - type: date
        # justify: center
        timezone: UTC
        date_format: "%a %b %-d, %Y UTC"
        color: darklime
        font_size: auto

  - name: divider-1
    height: 5px
    panels:
      - type: divider
        height: 2px
        color: grey

  - name: den-clock
    height: 12.92%
    panels:
      - type: clock
        # justify: center
        width: 70%
        timezone: America/Denver
        # label: "DEN"
        time_format: 12h         # h:MM AM/PM
        color: cornflower
        font_size: auto
        font_behavior: scale_numeric
      - type: text
        # justify: center
        label: "DEN"
        color: steelblue
        font_behavior: scale_numeric

  - name: den-date
    height: 6.25%
    panels:
      - type: date
        # justify: center
        timezone: America/Denver
        date_format: "%A, %B %-d"
        color: steelblue
        font_size: auto

  - name: et-clock
    height: 14.17%
    # background: 300080  # indigo... show demo of hex value
    panels:
      - type: clock
        # justify: center
        timezone: US/Eastern
        # label: "ET" # when label is different size than time, layout gets weird
        time_format: 12h
        color: orange
          # label: darkorange
        font_size: auto
        font_behavior: scale_numeric
      - type: text
        # justify: center
        label: "ATL"
        color: darkorange
        font_size: auto
        background: black
        width: 30%
        font_behavior: scale_numeric

  - name: ist-clock
    height: 12.50%
    panels:
      - type: clock
        # justify: center
        timezone: Asia/Kolkata
        # label: "IST"
        time_format: 12h
        color: brown
        font_size: auto
      - type: text
        # justify: center
        label: "IST"
        color: brown
        font_size: auto
        background: black
        width: 30%
        font_behavior: default

  - name: divider-2
    height: 1px
    panels:
      - type: divider
        height: 1px
        # color: darkgrey # darkgrey is default

  - name: ntp-status
    height: 4.58%
    background: navy
    panels:
      - type: text
        # justify: center
        label: "Time sync status:"
        color: periwinkle
        font_size: auto
        background: black
        width: 60%
      - type: fact
        # justify: center
        source: ntp_all
        color: white
        font_size: auto
        background: black

  - name: ip-wifi
    height: 6.67%
    panels:
      - type: fact
        width: 50%
        # justify: center
        source: ip
        label: ""
        color: grey
        font_size: auto
        font_behavior: scale_numeric
      - type: wifi_graphic
        width: 10.00%
        # justify: center
        color: lime
      - type: fact
        # justify: center
        source: wifi_signal
        # label: "default"
        color: lime
        font_size: auto

  - name: cpu-mem
    height: 5.42%
    panels:
      - type: fact
        # justify: center
        source: cpu
        label: "cpu: "
        color: yellow
        font_size: auto
      - type: fact
        # justify: center
        source: mem
        color: purple
        font_size: auto

  - name: disk
    height: 5.42%
    panels:
      - type: fact
        # justify: center
        source: disk
        color: green
        font_size: auto

  - name: debug
    height: 9.58%
    panels:
      - type: debug
        width: 70%
        color: tan
      - type: fact
        width: 30%
        label: v
        color: rust
        source: version
        font_size: auto
        font_behavior: scale_numeric
