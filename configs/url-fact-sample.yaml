---
orientation: square

rows:
  - name: time
    height: 33%
    panels:
      - type: clock
        font_size: huge
        color: '#00ff00'

  - name: external-ip
    height: 22%
    panels:
      - type: url-fact
        url: https://api.ipify.org?format=json
        json_path: ip
        interval: 5m
        timeout: 5
        label: "Public IP "
        color: '#ffffff'
        font_size: normal

  - name: random-quote
    height: 22%
    background: '#1a1a1a'
    panels:
      - type: url-fact
        url: https://api.quotable.io/random
        json_path: content
        interval: 10m
        timeout: 5
        fallback: "No quote"
        color: '#ffff00'
        font_size: small

  - name: http-example
    height: 11%
    panels:
      - type: url-fact
        url: http://example.com/
        pattern: '<title>([^<]+)</title>'
        interval: 1h
        timeout: 5
        fallback: "example"
        label: "title "
        color: '#aaaaaa'
        font_size: normal

      - type: url-fact
        width: 15%
        justify: right
        url: http://sensor-master.lan/last-json
        json_path: tempF
        interval: 33s
        timeout: 5
        color: darkorange
        font_size: auto
        # string "71.8" -> float -> int, rounded up to "72"
        transform: [round]

      - type: url-fact
        width: 15%
        justify: right
        url: http://sensor-master.lan/last-json
        json_path: tempF
        interval: 33s
        timeout: 5
        color: darkorange
        font_size: auto
        # 'format' escape hatch: string "71.8" -> float -> "71.8F"
        transform: [{format: "{:.1f}F"}]

  - name: status-fact
    height: 12%
    panels:
      - type: text
        label: "HELLO"
        font_size: auto
        color: white
        background: navy
        # "HELLO" -> "hello"
        transform: [lower]
      - type: text
        label: "hello world"
        font_size: auto
        color: yellow
        background: darkgrey
        # "hello world" -> "HelloWorld" (TitleCase / PascalCase)
        transform: [titlecase]
      - type: text
        label: "hello world"
        font_size: auto
        color: '#00ffff'
        background: darkgrey
        # "hello world" -> "helloWorld" (true camelCase)
        transform: [camelcase]
