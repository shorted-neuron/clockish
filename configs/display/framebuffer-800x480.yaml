# Raspberry Pi Official 7" Touch Display (DSI) — 800 × 480
# ---------------------------------------------------------------------------
# Connects via the DSI ribbon-cable connector, no SPI/GPIO needed.
# The display appears as /dev/fb0 automatically at boot.
#
# Compatible with:
#   Raspberry Pi Touch Display  (2013 original, 800×480)
#   Raspberry Pi Touch Display 2 (2024, 800×480 default mode)
#
# No extra pip packages required — uses the Linux kernel framebuffer.
#
# Prerequisites:
#   sudo usermod -aG video $USER   (log out and back in)
#
# To avoid terminal text appearing over clockish, run over SSH or see
# the console-suppression notes in src/clockish/drivers/framebuffer.py.
#
# Check your actual resolution first:
#   fbset -i
#   cat /sys/class/graphics/fb0/virtual_size
# ---------------------------------------------------------------------------

display:
  driver:   framebuffer
  device:   /dev/fb0
  width:    800
  height:   480
  rotation: 0

