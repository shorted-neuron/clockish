# ILI9486  --  landscape canvas (480 x 320), hardware rotated to landscape
# ---------------------------------------------------------------------------
# Physical display: 3.5" SPI TFT wired to Raspberry Pi
# Compatible hardware: MPI3501, MHS3528, and most generic ILI9486 RPi HATs
#
# The PIL canvas is drawn in landscape orientation (480 wide x 320 tall).
# Use this profile with: big-red.yaml, debug-landscape.yaml, nixie.yaml,
#                        seven-segment.yaml, fourteen-segment.yaml,
#                        landscape-demo.yaml, and any other 480x320 row config.
#
# To use a portrait canvas instead, use ili9486-portrait.yaml.
# ---------------------------------------------------------------------------

display:
  driver:   ili9486
  width:    480
  height:   320
  rotation: 180       # 180 = LOWER_RIGHT origin (landscape on screen)

  # Optional overrides (defaults shown):
  # sku:          MPI3501   # MPI3501 (RGB666) | MHS3528 (RGB565)
  # spi_bus:      0
  # spi_device:   0
  # spi_speed_hz: 64000000
  # dc_pin:       24        # BCM GPIO for Data/Command
  # rst_pin:      25        # BCM GPIO for Reset

