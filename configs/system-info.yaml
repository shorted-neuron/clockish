---
# system-info.yaml  --  clockish config
# ---------------------------------------------------------------------------
# System information display: local time + all available fact sources.
# Display settings are in display.yaml  --  use configs/display/ili9486-portrait.yaml.
#
# Row heights are percentages of the target 320x480 portrait canvas; panel
# widths are percentages of the target 320 width. font_size: auto sizes each
# panel to 75% of its OWN row height, so named-scale mismatches (a named font
# is a fixed % of the *display* height, not the row) can't happen here.
# Dividers keep pixel heights  --  they're spacers, not content, so there's
# no font to size against.
# ---------------------------------------------------------------------------

orientation: portrait

rows:
  - name: app-header
    height: 8.33%
    background: navy
    panels:
      - type: text
        # justify: center
        label: "clockish"
        color: silver
        font_size: auto

  - name: app-version
    height: 6.25%
    background: navy
    panels:
      - type: fact
        # justify: center
        source: version
        label: "default"
        color: grey
        font_size: auto

  - name: divider-1
    height: "5px"
    background: black
    panels:
      - type: divider
        height: "1px"
        color: darkgrey

  - name: local-clock
    height: 11.67%
    panels:
      - type: clock
        # justify: center
        timezone: local
        time_format: 24hs
        color: white
        font_size: auto

  - name: local-date
    height: 7.50%
    panels:
      - type: date
        # justify: center
        timezone: local
        date_format: "%a, %B %-d %Y"
        color: pink
        font_size: auto

  - name: network
    height: 5.83%
    background: darkred
    panels:
      - type: fact
        # justify: center
        source: hostname
        label: "default"
        color: yellow
        font_size: auto
      - type: fact
        # justify: center
        source: ip
        # label: "default"
        color: silver
        font_size: auto

  - name: wifi-status
    height: 9.17%
    panels:
      - type: wifi_graphic
        width: 20.00%
        # justify: center
        color: lime
        background: navy
      - type: fact
        # justify: center
        source: wifi_status
        color: lime
        font_size: auto
      - type: fact
        # justify: center
        source: wifi_ssid
        label: "default"
        color: darklime
        font_size: auto

  - name: wifi-signal
    height: 5.42%
    panels:
      - type: fact
        # justify: center
        source: wifi_signal
        label: "default"
        color: yellow
        font_size: auto
      - type: fact
        # justify: center
        source: wifi_quality
        label: "default"
        color: darkyellow
        font_size: auto

  - name: divider-2
    height: "3px"
    panels:
      - type: divider
        height: "1px"
        color: darkgrey

  - name: ntp
    height: 5.42%
    panels:
      - type: fact
        # justify: center
        source: ntp_status
        label: "default"
        color: cyan
        font_size: auto
      - type: fact
        # justify: center
        source: ntp_upstream
        label: "default"
        color: steelblue
        font_size: auto

  - name: divider-3
    height: "3px"
    panels:
      - type: divider
        height: "1px"
        color: darkgrey

  - name: cpu
    height: 5.42%
    panels:
      - type: fact
        # justify: center
        source: cpu
        label: "default"
        color: yellow
        font_size: auto
      - type: fact
        # justify: center
        source: cpu_load
        label: "default"
        color: darkyellow
        font_size: auto

  - name: memory
    height: 5.42%
    panels:
      - type: fact
        # justify: center
        source: mem
        label: "default"
        color: purple
        font_size: auto

  - name: disk
    height: 5.42%
    panels:
      - type: fact
        # justify: center
        source: disk
        label: "default"
        color: green
        font_size: auto

  - name: temp
    height: 5.63%
    panels:
      - type: fact
        # justify: center
        source: temp
        label: "default"
        color: orange
        font_size: auto

  - name: uptime-config
    height: 5.42%
    panels:
      - type: fact
        justify: left
        source: uptime
        label: "default"
        color: grey
        font_size: auto
      - type: fact
        justify: right
        source: config_file
        # label: "default"
        color: brown
        font_size: auto

  - name: debug
    height: 10.83%
    background: chocolate
    panels:
      - type: debug
        color: tan
