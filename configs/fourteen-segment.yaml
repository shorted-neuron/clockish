# fourteen-segment.yaml — clockish config for a VFD-style 14-segment clock
# ---------------------------------------------------------------------------
# Requires the DSEG14Classic font (SIL OFL 1.1 license).
# Install one of these ways:
#
#   Option A — apt package (Debian / Raspberry Pi OS / Ubuntu):
#     sudo apt install fonts-dseg
#
#   Option B — vendor the font into third_party/dseg/:
#     bash scripts/download-dseg-font.sh
#
# Unlike DSEG7, the 14-segment font supports the full alphabet — so the date
# row is rendered in 14-seg style too, giving a full VFD display look.
#
# Font variants available once installed (change default_font below):
#   DSEG14Classic-Regular.ttf   <- authentic look: ghost/"off" segments visible
#   DSEG14Classic-Bold.ttf
#   DSEG14Classic-Italic.ttf    <- nice retro slant
#   DSEG14Classic-BoldItalic.ttf
#   DSEG14Modern-Regular.ttf    <- cleaner look: no ghost segments
#   DSEG14Modern-Bold.ttf
#
# The 'file' is searched in:
#   /usr/share/fonts/truetype/dseg/  (apt install fonts-dseg)
#   third_party/dseg/                (scripts/download-dseg-font.sh)
#
# See also: https://github.com/keshikan/DSEG
# ---------------------------------------------------------------------------

orientation: landscape
default_font: DSEG14Classic-Italic.ttf

rows:
  - name: clock
    height: "55%"
    panels:
      - type: clock
        justify: center
        timezone: US/Mountain
        time_format: 24h
        color: lawngreen
        font_size: huge

  - name: divider-1
    height: "1%"
    panels:
      - type: divider
        height: 1
        color: seagreen

  - name: date
    height: "15%"
    panels:
      - type: date
        justify: left
        timezone: US/Mountain
        date_format: "%a, %B %-d"   # 14-seg handles letters — no need to fall back to DejaVu
        color: medspringgreen
        font_size: normal
      - type: clock
        justify: right
        timezone: US/Mountain
        time_format: 24hs
        color: seagreen
        font_size: small

  - name: divider-2
    height: "1%"
    panels:
      - type: divider
        height: 1
        color: seagreen

  - name: wifi-info
    height: "11%"
    panels:
      - type: wifi_graphic
        width: 50
        color: seagreen
      - type: fact
        width: 20%
        source: wifi_status
        color: seagreen
        font_size: tiny
      - type: fact
        width: 20%
        source: wifi_ssid
        color: forestgreen
        font_size: tiny
      - type: fact
        width: 35%
        source: wifi_signal
        # label: "sig: "
        color: forestgreen
        font_size: tiny
      - type: fact
        width: 18%
        source: wifi_quality
        label: "q:"
        color: forestgreen
        font_size: tiny

  - name: host-ip
    height: "12%"
    panels:
      - type: fact
        width: 30%
        justify: left
        source: hostname
        color: seagreen
        font_size: tiny
      - type: fact
        width: 38%
        justify: center
        source: ip
        color: seagreen
        font_size: tiny
      - type: debug
        color: forestgreen
        font: debug
