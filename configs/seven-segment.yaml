---
# seven-segment.yaml  --  clockish config for red 7-segment-style clock
# ---------------------------------------------------------------------------
# Requires the DSEG7Classic font (SIL OFL 1.1 license).
# Install one of these ways:
#
#   Option A  --  apt package (Debian / Raspberry Pi OS / Ubuntu):
#     sudo apt install fonts-dseg
#
#   Option B  --  vendor the font into third_party/dseg/:
#     bash scripts/download-dseg-font.sh
#
# DSEG7 is digits/symbols only  --  date text and info rows use DejaVu Sans.
#
# Font variants available once installed (change file: in fonts: below):
#   DSEG7Classic-Regular.ttf   <- authentic look: ghost/"off" segments visible
#   DSEG7Classic-Bold.ttf
#   DSEG7Classic-Italic.ttf
#   DSEG7Classic-BoldItalic.ttf
#   DSEG7Modern-Regular.ttf    <- cleaner look: no ghost segments
#   DSEG7Modern-Bold.ttf
#
# The 'file' is searched in:
#   /usr/share/fonts/truetype/dseg/  (apt install fonts-dseg)
#   third_party/dseg/                (scripts/download-dseg-font.sh)
#
# See also: https://github.com/keshikan/DSEG
# ---------------------------------------------------------------------------

orientation: landscape

# DSEG7 is used only for clock panels; no default_font is set so that all
# other panels (date text, info rows) fall back to DejaVu Sans via the
# built-in named scale sizes.
fonts:
  dseg7:
    file: DSEG7Classic-Italic.ttf

rows:
  - name: clock
    height: "47%"
    panels:
      - type: clock
        justify: center
        timezone: US/Mountain
        time_format: "%-I:%M"
        # time_format: 24h        # 24h looks most authentic on a 7-seg display
        color: ff0000
        font: dseg7
        font_size: auto

  - name: divider-1
    height: "1%"
    panels:
      - type: divider
        height: "1px"
        color: burntsienna

  - name: date
    height: "16%"
    panels:
      - type: date
        justify: left
        timezone: US/Mountain
        date_format: "%a, %B %-d"
        color: darkorange
        font_size: normal
      - type: clock
        justify: right
        timezone: US/Mountain
        time_format: 24hs
        color: burntsienna
        font: dseg7
        font_size: 10%

  - name: divider-2
    height: "1%"
    panels:
      - type: divider
        height: "1px"
        color: burntsienna

  - name: wifi-info
    height: "11%"
    panels:
      - type: wifi_graphic
        width: 9.17%
        color: burntsienna
      - type: fact
        width: 20%
        source: wifi_status
        color: burntsienna
        font_size: small
      - type: fact
        width: 20%
        source: wifi_ssid
        # label: "SSID "
        color: rust
        font_size: small
      - type: fact
        width: 25%
        source: wifi_signal
        label: "sig "
        color: rust
        font_size: small
      - type: fact
        justify: right
        width: 18%
        source: wifi_quality
        label: "q:"
        color: rust
        font_size: small

  - name: host-ip
    height: "14%"
    panels:
      - type: fact
        width: 24%
        justify: left
        source: hostname
        color: burntsienna
        font_size: small
      - type: fact
        width: 38%
        justify: center
        source: ip
        color: burntsienna
        font_size: tiny
      - type: debug
        color: rust
