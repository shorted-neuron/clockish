---
# debug-landscape.yaml  --  clockish config
# ---------------------------------------------------------------------------
# Display layout configuration for clockish.py
# Display settings are in display.yaml  --  use configs/display/ili9486-landscape.yaml.
# ---------------------------------------------------------------------------

orientation: landscape

rows:
  - name: utc-clock
    height: 72
    background: darkblue
    panels:
      - type: clock
        width: 40%
        timezone: UTC
        time_format: 24h
        color: lime
        font_size: huge
      - type: date
        width: 25%
        timezone: UTC
        date_format: ":%S UTC"
        color: lime
        font_size: huge
      - type: date
        width: 35%
        timezone: UTC
        date_format: "%a %b %-d, %Y"
        color: darklime
        font_size: small

  - name: divider-1
    height: 3
    background: grey
    panels:
      - type: divider
        height: 1
        color: red

  - name: den-clock
    height: 64
    panels:
      - type: clock
        width: 60%
        justify: left
        timezone: America/Denver
        label: "DEN"
        time_format: 12h
        color: ff0000
        font_size: big

      - type: date
        timezone: America/Denver
        date_format: " %a, %B %-d"
        color: slate
        font_size: normal

  - name: ist-clock
    height: 36
    panels:
      - type: clock
        width: 70%
        justify: left
        timezone: Asia/Kolkata
        label: "IST"
        time_format: 12h
        color: brown
        font_size: big
      - type: clock
        width: 30%
        justify: right

  - name: divider-2
    height: 1
    panels:
      - type: divider
        height: 1

  - name: ntp-status
    height: 26
    background: darkgrey
    panels:
      - type: text
        label: "Time sync status:"
        color: white
        font_size: small
        background: black
        width: 60%
      - type: fact
        source: ntp_all
        label: " is "
        color: black
        font_size: small
        background: darkred

  - name: ip-disk
    height: 32
    panels:
      - type: fact
        source: hostname
        label: "host: "
        color: lime
        font_size: small
      - type: fact
        source: ip
        label: "ip "
        color: grey
        font_size: small

  - name: cpu-mem
    height: 26
    panels:
      - type: fact
        width: 40%
        source: cpu
        label: "cpu: "
        color: yellow
        font_size: small
      - type: fact
        source: mem
        color: purple
        font_size: small

  - name: debug
    height: 60
    panels:
      - type: debug
        width: 70%
        color: brown
      - type: fact
        label: v
        source: version
        font_size: small
