  - name: cpu
    height: 26
    panels:
      - type: fact
        # justify: center
        source: cpu
        label: "default"
        color: yellow
        font: small
      - type: fact
        # justify: center
        source: cpu_load
        label: "default"
        color: darkyellow
        font: small

