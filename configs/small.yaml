---
# small.yaml  --  clockish config
# ---------------------------------------------------------------------------
# Layout for a small 240x135 ST7789 display (e.g. Adafruit 1.14" TFT #4383).
# Display settings are in display.yaml  --  use configs/display/st7789-240x135.yaml.
# ---------------------------------------------------------------------------

orientation: landscape

# clockish-preview has no way to know the real ST7789 dimensions without a
# display profile on disk; this hint keeps the PNG preview honest.
preview_size: "240x135"

rows:
  - name: app-header
    height: 30px
    background: navy
    panels:
      - type: text
        # justify: center
        label: "clockish"
        color: silver
        font_size: auto
      - type: fact
        # justify: center
        source: version
        label: "default"
        color: grey
        font_size: auto

  - name: local-clock
    height: 30px
    panels:
      - type: clock
        # justify: center
        timezone: local
        time_format: 24hs
        color: white
        font_size: auto

  - name: network
    height: 28px
    background: darkred
    panels:
      - type: fact
        width: 50%
        justify: left
        source: hostname
        # label: "default"
        color: yellow
        font_size: 16px
      - type: fact
        justify: right
        source: ip
        # label: "default"
        color: silver
        font_size: 16px

# - name: wifi-status
#   height: 24px
#   panels:
#     - type: wifi_graphic
#       width: 34px
#       # justify: center
#       color: lime
#       background: navy
#     - type: fact
#       # justify: center
#       source: wifi_status
#       color: lime
#       font_size: tiny
#     - type: fact
#       # justify: center
#       source: wifi_ssid
#       label: "default"
#       color: darklime
#       font_size: tiny

  - name: cpu
    height: 26px
    panels:
      - type: fact
        # justify: center
        source: cpu
        label: "default"
        color: yellow
        font_size: auto
      - type: fact
        # justify: center
        source: cpu_load
        label: "default"
        color: darkyellow
        font_size: auto
