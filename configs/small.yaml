# small-info.yaml — clockish config
# ---------------------------------------------------------------------------
# Layout for a small 240×135 ST7789 display (e.g. Adafruit 1.14" TFT #4383).
# Display settings are in display.yaml — use configs/display/st7789-240x135.yaml.
# ---------------------------------------------------------------------------


rows:
  - name: app-header
    height: 30
    background: navy
    panels:
      - type: text
        # justify: center
        label: "clockish"
        color: silver
        font: small
      - type: fact
        # justify: center
        source: version
        label: "default"
        color: grey
        font: small

  - name: local-clock
    height: 30
    panels:
      - type: clock
        # justify: center
        timezone: local
        time_format: 24hs
        colors:
          time:   white
          label:  grey
        time_font: small

  - name: network
    height: 28
    background: darkred
    panels:
      - type: fact
        width: 40%
        # justify: center
        source: hostname
        # label: "default"
        color: yellow
        font: small
      - type: fact
        # justify: center
        source: ip
        # label: "default"
        color: silver
        font: tiny

# - name: wifi-status
