# small-info.yaml — clockish config
# ---------------------------------------------------------------------------
# Layout for a small 240×135 ST7789 display (e.g. Adafruit 1.14" TFT #4383).
# Install the driver library:  pip install clockish[st7789]
# See clockish.yaml for full row/panel documentation.
# ---------------------------------------------------------------------------

display:
  driver:   st7789
  width:    240
  height:   135
  rotation: 0          # ST7789 landscape panels: use 0, not 90

  # --- ST7789 driver settings ---
  spi_port:     0
  spi_cs:       0      # CE0
  dc_pin:       25     # BCM GPIO 25  (board.D25)
  # rst_pin:    ~      # not connected on most breakout boards
  # backlight_pin: ~   # omit to leave backlight always on
  spi_speed_hz: 64000000
  invert:       true   # required by most ST7789 panels

  # Adafruit 240×135 panel sits at offset (53, 40) in the ST7789
  # controller's 320×240 framebuffer — required for correct addressing.
  offset_left:  53
  offset_top:   40

rows:
  - name: app-header
    height: 30
    background: navy
    panels:
      - type: text
        # justify: center
        label: "clockish"
        color: silver
        font: small
      - type: fact
        # justify: center
        source: version
        label: "default"
        color: grey
        font: small

  - name: local-clock
    height: 30
    panels:
      - type: clock
        # justify: center
        timezone: local
        time_format: 24hs
        colors:
          time:   white
          label:  grey
        time_font: small

  - name: network
    height: 28
    background: darkred
    panels:
      - type: fact
        width: 40%
        # justify: center
        source: hostname
        # label: "default"
        color: yellow
        font: small
      - type: fact
        # justify: center
        source: ip
        # label: "default"
        color: silver
        font: tiny

