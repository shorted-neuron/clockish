---
# clockish-config.schema.yaml  --  JSON Schema (Draft 7) for clockish layout configs
#
# Editor integration (VS Code YAML extension / yaml-language-server):
#   Add to .vscode/settings.json:
#     yaml.schemas: { ./configs/schema/clockish-config.schema.yaml: [configs/*.yaml] }
#
$schema: https://json-schema.org/draft-07/schema#
title: Clockish Layout Config
description: |
  Schema for clockish YAML display layout configuration files.
  See https://github.com/shorted-neuron/clockish for documentation.
type: object
required:
  - orientation
  - rows

additionalProperties: true

properties:
  orientation:
    type: string
    enum:
      - landscape
      - portrait
      - square
    description: |
      Display orientation hint. Informational - used when selecting a config for a specific display.
      landscape: aspect >= ~1.5 (e.g. 800x480)
      portrait:  aspect <= ~0.7 (e.g. 320x480)
      square:    aspect ~ 1.0
  default_font:
    type: string
    description: |
      TTF file name used for all built-in scale font sizes (giant/huge/big/med/normal/small/tiny/micro).
      Searched in third_party/ subdirectories and system font paths.
  fonts:
    type: object
    description: Named custom font definitions. Each key is a font reference name used in panels.
    additionalProperties:
      type: object
      required:
        - file
      properties:
        file:
          type: string
          description: TTF file name (searched in third_party/ and system font paths).
        size:
          description: 'Optional fixed size: integer pixels or percentage string like ''10%''.'
      additionalProperties: false
  display:
    type: object
    description: Display hardware profile. Usually provided by a separate display.yaml file.
  preview_size:
    type: string
    pattern: '^\d+x\d+$'
    description: |
      Preview-tool-only override for non-standard target resolutions (e.g. small ST7789
      panels or oversized framebuffers). Format "WxH" pixels, e.g. "240x135".
      Ignored by production (which always uses the real display profile / display: section).
      Only needed when the orientation-based preview default (480x320 landscape /
      320x480 portrait) doesn't match the config's intended display.
  rows:
    type: array
    minItems: 1
    description: Ordered list of display rows, rendered top-to-bottom.
    items:
      type: object
      required:
        - name
        - height
      additionalProperties: true
      properties:
        name:
          type: string
          description: Unique label for this row (used in debug output).
        height:
          description: >-
            Row height: integer pixels >= 1, "Npx" string, float fraction 0 < x < 1,
            or percentage string like '15%'.
          anyOf:
            - type: integer
              minimum: 1
            - type: number
              exclusiveMinimum: 0.0
              exclusiveMaximum: 1.0
            - type: string
              pattern: ^\d+(\.\d+)?%$
            - type: string
              pattern: ^\d+(\.\d+)?px$
        background:
          type: string
          description: 'Row background color (name or hex). Default: black.'
        panels:
          type: array
          minItems: 1
          description: Left-to-right ordered list of panels in this row.
          items:
            type: object
            required:
              - type
            additionalProperties: true
            properties:
              type:
                type: string
                description: 'Panel renderer. Known types:
                  clock, date, fact, text, divider, wifi_graphic, debug, blank.'
              justify:
                type: string
                enum:
                  - left
                  - right
                  - center
                description: Horizontal text alignment within the panel.
              color:
                type: string
                description: Foreground/text color (palette name or hex string).
              background:
                type: string
                description: Panel background color override.
              font:
                type: string
                description: Named font entry from the 'fonts:' section, or special alias 'debug' (always DejaVu Sans).
                  Do NOT use built-in scale names here  --  use 'font_size:' instead.
              font_size:
                description: 'Font size: built-in scale name (giant/huge/big/med/normal/small/tiny/micro),
                  percentage string like ''10%'', "Npx" string, integer pixels, or ''auto'' (75% of row height).'
              width:
                description: 'Panel width: integer pixels >= 1, "Npx" string, float fraction 0 < x < 1,
                  percentage string, ''auto'', or ''default''.'
                anyOf:
                  - type: integer
                    minimum: 1
                  - type: number
                    exclusiveMinimum: 0.0
                    exclusiveMaximum: 1.0
                  - type: string
              label:
                type: string
                description: Static label text prefix. Use 'default' for the built-in label.
              transform:
                type: array
                description: |
                  Ordered list of value transforms applied to the panel's core text before
                  the label is added. Entries are either a bare name ('UPPER', 'lower', 'round',
                  'ceil', 'floor', 'int', 'Titlecase', 'PascalCase', 'camelCase', 'strip', 'abs')
                  or a single-key mapping for parameterised transforms
                  ({round: 1}, {multiply: 1.8}, {add: 32}, {replace: {from: a, to: b}},
                  {prefix: '~'}, {suffix: '%'}, {format: '{:.1f}F'}).
                  Supported on: clock, date, fact, text, url-fact panels.
                items:
                  anyOf:
                    - type: string
                    - type: object
                      minProperties: 1
                      maxProperties: 1
