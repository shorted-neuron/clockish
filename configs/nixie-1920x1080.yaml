# fullscreen-clock.yaml — clockish config for a full screen HD 1920x1080 display
# ---------------------------------------------------------------------------
# Requires the Nixie One font (SIL OFL 1.1 license).
# Nixie One is a Google Font by Jovanny Lemonad — a faithful recreation of
# the warm, glowing cathode style of vintage Nixie tube displays.
#
# Install:
#   bash scripts/download-nixie-font.sh
#
# (No apt package exists for Nixie One; the script downloads it from the
#  Google Fonts GitHub repository.)
#
# Font file installed:
#   third_party/nixie/NixieOne-Regular.ttf
#   (only one weight/style is available for this font)
#
# See also: https://fonts.google.com/specimen/Nixie+One
#           https://github.com/google/fonts/tree/main/ofl/nixieone
# ---------------------------------------------------------------------------

# ---------------------------------------------------------------------------
# Custom fonts — maps a config name to a TTF file + size.
# The 'file' is searched in all subdirectories of third_party/ automatically,
# so third_party/nixie/NixieOne-Regular.ttf will be found after running the
# download script.
# ---------------------------------------------------------------------------
fonts:
  nixiegiant:
    file: NixieOne-Regular.ttf
    size: 900
  nixiehuge:
    file: NixieOne-Regular.ttf
    size: 128
  nixiemed:
    file: NixieOne-Regular.ttf
    size: 64
  nixiesmall:
    file: NixieOne-Regular.ttf
    size: 32

# Display settings are in display.yaml — use configs/display/framebuffer-1920x1080.yaml

rows:
  - name: clock
    height: 900
    panels:
      - type: clock
        # width: 85% # uncomment if using the am/pm indicator below
        justify: center
        timezone: US/Mountain
        time_format: "%-I:%M"
        colors:
          # time: darkorange      # classic warm nixie yellow-orange
          time: burntsienna       # deeper amber
          # time: orange          # bright amber
        time_font: nixiegiant
      # - type: clock
      #   width: 15%
      #   justify: center
      #   timezone: US/Mountain
      #   time_format: "%p"
      #   colors:
      #     time: burntsienna
      #   time_font: nixiehuge

  - name: divider-1
    height: 19
    panels:
      - type: divider
        height: 1
        color: rust

  - name: date
    height: 100
    panels:
      - type: date
        justify: center
        timezone: US/Mountain
        date_format: "%A, %B %-d"
        colors:
          date: darkorange
        date_font: nixiemed
#      - type: date
#        justify: center
#        timezone: US/Mountain
#        date_format: ":%S"
#        colors:
#          time: burntsienna
#        date_font: nixiemed

  - name: divider-2
    height: 19
    panels:
      - type: divider
        height: 1
        color: rust

  - name: info
    height: 42
    panels:
      - type: wifi_graphic
        width: 44
        color: burntsienna
      - type: fact
        width: 15%
        source: wifi_status
        color: rust
        font: nixiesmall
      - type: fact
        width: 15%
        source: hostname
        color: rust
        font: nixiesmall
      - type: fact
        source: ip
        width: 20%
        color: rust
        font: nixiesmall
      - type: fact
        width: 10%
        justify: center
        source: cpu
        color: rust
        font: nixiesmall
      - type: fact
        source: ntp_all
        color: rust
        font: nixiesmall
      - type: debug
        width: 30%
        color: rust
        font: small

